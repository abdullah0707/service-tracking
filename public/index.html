<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Service Tracking — لوحة التحكم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧹</text></svg>">
  <meta name="theme-color" content="#1a1f36">
</head>
<body class="rtl">

<!-- Mobile topbar -->
<header class="topbar" id="topbar">
  <button class="control-btn" style="width:auto;padding:8px 10px;border-color:transparent;background:none;color:var(--text-primary)" onclick="toggleMobileSidebar()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <span style="font-weight:700;font-size:15px;color:var(--text-primary)">Service Tracking</span>
  <button class="control-btn" style="width:auto;padding:8px 10px;border-color:transparent;background:none;color:var(--text-primary)" onclick="app.toggleTheme()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
</header>

<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <!-- Logo + user info -->
    <div class="sidebar-logo">
      <div class="logo-mark">ST</div>
      <h1 data-i18n="appName">Service Tracking</h1>
      <p data-i18n="appTagline">لوحة إدارة خدمات التنظيف</p>
    </div>

    <!-- Logged-in user badge -->
    <div class="user-badge" id="user-badge" style="display:none">
      <div class="user-badge-avatar" id="user-avatar">A</div>
      <div class="user-badge-info">
        <span class="user-badge-name" id="user-display-name">—</span>
        <span class="user-badge-role" id="user-role">—</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-link active" data-page="dashboard" onclick="app.navigate('dashboard')">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        <span data-i18n="navDashboard">اليوم</span>
        <span class="shortcut-key">1</span>
      </button>

      <button class="nav-link" data-page="callcenter" onclick="app.navigate('callcenter')">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.65 3.27 2 2 0 0 1 3.62 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        <span data-i18n="navCallCenter">كول سنتر</span>
        <span class="shortcut-key">2</span>
      </button>

      <button class="nav-link" data-page="customers" onclick="app.navigate('customers')">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span data-i18n="navCustomers">العملاء</span>
        <span class="shortcut-key">3</span>
      </button>

      <button class="nav-link" data-page="workers" onclick="app.navigate('workers')">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/>
          <path d="M6 20v-2a6 6 0 0 1 12 0v2"/>
        </svg>
        <span data-i18n="navWorkers">العمالة</span>
        <span class="shortcut-key">4</span>
      </button>

      <button class="nav-link" data-page="settings" onclick="app.navigate('settings')">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>الإعدادات</span>
        <span class="shortcut-key">5</span>
      </button>

      <div class="kbd-hint">⌨️ اضغط 1–5 للتنقل السريع</div>
    </nav>

    <div class="sidebar-controls">
      <button class="control-btn" id="theme-toggle" onclick="app.toggleTheme()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <span data-i18n="darkMode">الوضع الداكن</span>
      </button>

      <button class="control-btn" id="lang-toggle" onclick="app.toggleLang()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span>English</span>
      </button>

      <!-- Logout button -->
      <button class="control-btn logout-btn" id="logout-btn" onclick="auth.logout()" style="color:rgba(255,80,80,.8)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span id="logout-label">تسجيل الخروج</span>
      </button>

      <div class="control-btn" id="clock"
           style="cursor:default;justify-content:center;font-size:13px;font-variant-numeric:tabular-nums">
        ──:──
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div id="page-content">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>
  </main>

</div>

<!-- Mobile bottom nav -->
<nav class="mobile-bottom-nav" id="mobile-bottom-nav">
  <div class="nav-items">
    <button class="mobile-nav-btn active" data-page="dashboard" onclick="app.navigate('dashboard')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      <span>اليوم</span>
    </button>
    <button class="mobile-nav-btn" data-page="callcenter" onclick="app.navigate('callcenter')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.65 3.27 2 2 0 0 1 3.62 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
      <span>كول سنتر</span>
    </button>
    <button class="mobile-nav-btn" data-page="customers" onclick="app.navigate('customers')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
      </svg>
      <span>العملاء</span>
    </button>
    <button class="mobile-nav-btn" data-page="workers" onclick="app.navigate('workers')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/>
      </svg>
      <span>العمالة</span>
    </button>
    <button class="mobile-nav-btn" data-page="settings" onclick="app.navigate('settings')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span>الإعدادات</span>
    </button>
  </div>
</nav>

<div id="sidebar-backdrop" onclick="toggleMobileSidebar()"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;backdrop-filter:blur(2px)"></div>
<div id="toast-container" aria-live="polite"></div>

<!-- Scripts -->
<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script src="/js/pages/dashboard.js"></script>
<script src="/js/pages/callcenter.js"></script>
<script src="/js/pages/customers.js"></script>
<script src="/js/pages/workers.js"></script>
<script src="/js/pages/settings.js"></script>
<script src="/js/app.js"></script>

<script>
  // ── Auth guard: redirect to login if no valid token ─────
  (async () => {
    const token = localStorage.getItem('st_token');
    if (!token) { window.location.href = '/login.html'; return; }
    try {
      const r = await fetch('/api/auth/me', {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (!r.ok) throw new Error('invalid');
      // Token is valid — show user info in sidebar
      const data = await r.json();
      const u = data.user;
      document.getElementById('user-badge').style.display = 'flex';
      document.getElementById('user-avatar').textContent = (u.displayName||u.username||'?').charAt(0).toUpperCase();
      document.getElementById('user-display-name').textContent = u.displayName || u.username;
      const lang = window.i18n?.current || 'ar';
      document.getElementById('user-role').textContent =
        u.role === 'admin'
          ? (lang==='ar' ? 'مدير النظام' : 'Admin')
          : (lang==='ar' ? 'كول سنتر'   : 'Call Center');
      document.getElementById('logout-label').textContent = lang==='ar' ? 'تسجيل الخروج' : 'Logout';
    } catch {
      localStorage.removeItem('st_token');
      localStorage.removeItem('st_user');
      window.location.href = '/login.html';
    }
  })();

  // ── Live clock ──────────────────────────────────────────
  function updateClock() {
    const el = document.getElementById('clock');
    if (!el) return;
    const lang = window.i18n?.current || 'ar';
    el.textContent = new Date().toLocaleTimeString(
      lang === 'ar' ? 'ar-EG' : 'en-US', { hour:'2-digit', minute:'2-digit' }
    );
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── Mobile sidebar ──────────────────────────────────────
  function toggleMobileSidebar() {
    const sb   = document.getElementById('sidebar');
    const bd   = document.getElementById('sidebar-backdrop');
    const open = sb.classList.toggle('open');
    bd.style.display = open ? 'block' : 'none';
    document.body.style.overflow = open ? 'hidden' : '';
  }

  // Patch navigate to update bottom nav + close sidebar
  document.addEventListener('DOMContentLoaded', () => {
    const orig = app.navigate.bind(app);
    app.navigate = async function(page) {
      document.querySelectorAll('.mobile-nav-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.page === page);
      });
      const sb = document.getElementById('sidebar');
      const bd = document.getElementById('sidebar-backdrop');
      if (sb?.classList.contains('open')) {
        sb.classList.remove('open');
        bd.style.display = 'none';
        document.body.style.overflow = '';
      }
      return orig(page);
    };
  });
</script>
</body>
</html>
